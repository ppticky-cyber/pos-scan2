
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-secondary)}
.app{max-width:420px;margin:0 auto;padding:.75rem}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr h2{font-size:16px;font-weight:600;color:var(--color-text-primary)}
.hdr-right{display:flex;gap:6px}
.icon-btn{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 10px;cursor:pointer;font-size:12px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px}
.icon-btn:hover{background:var(--color-background-secondary)}
.icon-btn.active{background:var(--color-background-danger);color:var(--color-text-danger);border-color:var(--color-border-danger)}

/* camera */
.cam-wrap{position:relative;width:100%;background:#000;border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:.75rem;display:none}
.cam-wrap video{width:100%;display:block;max-height:260px;object-fit:cover}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:200px;height:120px;border:2.5px solid #1D9E75;border-radius:8px;position:relative}
.scan-box::before{content:'';position:absolute;left:5%;right:5%;top:50%;height:2px;background:linear-gradient(90deg,transparent,#1D9E75,transparent);animation:sweep 1.8s ease-in-out infinite}
@keyframes sweep{0%,100%{top:15%}50%{top:82%}}
.cam-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* scan start screen */
.start-screen{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:2rem 1.5rem;text-align:center;margin-bottom:.75rem}
.start-icon{font-size:48px;margin-bottom:.75rem}
.start-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem}
.start-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem}
.scan-big-btn{width:100%;padding:14px;font-size:15px;font-weight:600;background:var(--color-background-success);color:var(--color-text-success);border:1.5px solid var(--color-border-success);border-radius:var(--border-radius-lg);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.scan-big-btn:hover{opacity:.88}

/* manual input */
.manual-row{display:flex;gap:6px;margin-bottom:.75rem}
.manual-row input{flex:1;font-size:14px;letter-spacing:.5px;text-transform:uppercase;border-radius:var(--border-radius-md)}
.manual-row button{white-space:nowrap;font-size:13px}

/* modal overlay */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:420px;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-sku{font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);margin-bottom:4px}
.modal-name{font-size:15px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px}
.modal-meta{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.25rem}
.price-big{font-size:36px;font-weight:700;color:var(--color-text-success);text-align:center;margin-bottom:.25rem}
.price-sub{font-size:12px;color:var(--color-text-secondary);text-align:center;margin-bottom:1.25rem}
.stock-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;margin-bottom:1.25rem}
.stock-pill.ok{background:var(--color-background-success);color:var(--color-text-success)}
.stock-pill.low{background:var(--color-background-warning);color:var(--color-text-warning)}
.stock-pill.out{background:var(--color-background-danger);color:var(--color-text-danger)}
.qty-sel{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1.25rem}
.qty-sel label{font-size:13px;color:var(--color-text-secondary)}
.qty-sel .qbtn{width:32px;height:32px;border-radius:50%;font-size:18px;font-weight:600;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary)}
.qty-sel .qval{font-size:20px;font-weight:700;color:var(--color-text-primary);min-width:36px;text-align:center}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-ok{padding:14px;font-size:15px;font-weight:700;background:var(--color-background-success);color:var(--color-text-success);border:1.5px solid var(--color-border-success);border-radius:var(--border-radius-lg);cursor:pointer}
.btn-ok:hover{opacity:.88}
.btn-ok:disabled{opacity:.4;cursor:not-allowed}
.btn-cancel{padding:14px;font-size:15px;font-weight:700;background:var(--color-background-danger);color:var(--color-text-danger);border:1.5px solid var(--color-border-danger);border-radius:var(--border-radius-lg);cursor:pointer}
.btn-cancel:hover{opacity:.88}

/* toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--border-radius-lg);font-size:13px;font-weight:500;z-index:200;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.ok-t{background:var(--color-background-success);color:var(--color-text-success);border:1px solid var(--color-border-success)}
.toast.err-t{background:var(--color-background-danger);color:var(--color-text-danger);border:1px solid var(--color-border-danger)}

/* sold log */
.log-wrap{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:.75rem}
.log-wrap h3{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;display:flex;justify-content:space-between}
.log-wrap h3 button{font-size:11px;color:var(--color-text-danger);background:none;border:none;cursor:pointer}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
.log-item:last-child{border-bottom:none}
.log-sku{font-family:var(--font-mono);font-size:11px;color:var(--color-text-primary)}
.log-detail{font-size:11px;color:var(--color-text-secondary)}
.log-amt{font-size:13px;font-weight:600;color:var(--color-text-success)}
.total-bar{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center}
.total-bar .tl{font-size:12px;color:var(--color-text-secondary)}
.total-bar .tv{font-size:18px;font-weight:700;color:var(--color-text-primary)}
</style>

<div class="app">

</div>

  </div>
</div>

// Build stock map
let stock={};
RAW.forEach(([sku,color,gender,size,sell])=>{
  const base=INIT_QTY[sku]??5;
  stock[sku]={sku,color,gender,size,sell,remaining:base};
});

let soldLog=[];
let curSKU=null,curQty=1;
let cr=null,scanning=false,lastCode='',lastTime=0;

function fmt(n){return n.toLocaleString();}

// ===== CAMERA =====
async function toggleCam(){
  if(scanning){stopCam();return;}
  try{
    if(typeof ZXing==='undefined'){toast('ກຳລັງໂຫຼດ...','err');return;}
    cr=new ZXing.BrowserMultiFormatReader();
    const devs=await cr.listVideoInputDevices();
    const back=devs.find(d=>d.label.toLowerCase().includes('back')||d.label.toLowerCase().includes('rear')||d.label.toLowerCase().includes('environment'));
    const id=(back||devs[devs.length-1]||devs[0])?.deviceId;
    document.getElementById('cam-wrap').style.display='block';
    document.getElementById('start-screen').style.display='none';
    const btn=document.getElementById('cam-toggle');
    btn.innerHTML='<i class="ti ti-camera-off"></i> ປິດ';
    btn.classList.add('active');
    scanning=true;
    await cr.decodeFromVideoDevice(id||null,'vid',onScan);
  }catch(e){
    toast('ເປີດກ້ອງບໍ່ໄດ້','err');
    stopCam();
  }
}

function stopCam(){
  if(cr){try{cr.reset();}catch(e){}}
  cr=null;scanning=false;
  document.getElementById('cam-wrap').style.display='none';
  document.getElementById('start-screen').style.display='block';
  const btn=document.getElementById('cam-toggle');
  btn.innerHTML='<i class="ti ti-camera"></i> ກ້ອງ';
  btn.classList.remove('active');
  const v=document.getElementById('vid');
  if(v&&v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null;}
}

function onScan(res){
  if(!res)return;
  const now=Date.now();
  const code=res.getText().trim().toUpperCase();
  if(code===lastCode&&now-lastTime<3000)return;
  lastCode=code;lastTime=now;
  beep();
  showModal(code);
}

function lookupManual(){
  const v=document.getElementById('sku-in').value.trim().toUpperCase();
  if(!v){toast('ໃສ່ SKU ກ່ອນ','err');return;}
  showModal(v);
  document.getElementById('sku-in').value='';
}

// ===== MODAL =====
function showModal(sku){
  const item=stock[sku];
  if(!item){toast('ບໍ່ພົບ: '+sku,'err');return;}
  curSKU=sku; curQty=1;
  const r=item.remaining;
  document.getElementById('m-sku').textContent=sku;
  document.getElementById('m-name').textContent=item.color+' — '+item.gender;
  document.getElementById('m-meta').textContent='Size: '+item.size;
  document.getElementById('m-price').textContent=fmt(item.sell);
  document.getElementById('m-qty').textContent='1';
  const sp=document.getElementById('m-stock');
  if(r===0){sp.className='stock-pill out';sp.innerHTML='<i class="ti ti-alert-triangle"></i> ໝົດສະຕັອກ';}
  else if(r<=3){sp.className='stock-pill low';sp.innerHTML='<i class="ti ti-alert-circle"></i> ໃກ້ໝົດ — ຄົງ '+r+' ອັນ';}
  else{sp.className='stock-pill ok';sp.innerHTML='<i class="ti ti-package"></i> ຄົງ '+r+' ອັນ';}
  document.getElementById('btn-ok').disabled=(r===0);
  document.getElementById('modal').classList.add('show');
}

function adjQty(d){
  if(!curSKU)return;
  const max=stock[curSKU].remaining;
  curQty=Math.max(1,Math.min(max,curQty+d));
  document.getElementById('m-qty').textContent=curQty;
}

function cancelSale(){
  document.getElementById('modal').classList.remove('show');
  curSKU=null;curQty=1;
  lastCode=''; // allow rescan same item
}

function confirmSale(){
  if(!curSKU)return;
  const item=stock[curSKU];
  if(curQty>item.remaining){toast('ສະຕັອກບໍ່ພໍ!','err');return;}
  item.remaining-=curQty;
  const amt=item.sell*curQty;
  soldLog.unshift({sku:curSKU,color:item.color,size:item.size,qty:curQty,amt,time:new Date().toLocaleTimeString('lo-LA',{hour:'2-digit',minute:'2-digit'})});
  document.getElementById('modal').classList.remove('show');
  beepOk();
  toast('✓ ຂາຍ '+curSKU+' x'+curQty+' = '+fmt(amt)+' ກີບ','ok');
  curSKU=null;curQty=1;lastCode='';
  renderLog();
}

function renderLog(){
  const lw=document.getElementById('log-wrap');
  const tb=document.getElementById('total-bar');
  if(!soldLog.length){lw.style.display='none';tb.style.display='none';return;}
  lw.style.display='block';tb.style.display='flex';
  let total=0;
  document.getElementById('log-list').innerHTML=soldLog.map(s=>{
    total+=s.amt;
    return`<div class="log-item">
      <div>
        <div class="log-sku">${s.sku}</div>
        <div class="log-detail">${s.color} · ${s.size} · x${s.qty} · ${s.time}</div>
      </div>
      <div class="log-amt">+${fmt(s.amt)}</div>
    </div>`;
  }).join('');
  document.getElementById('total-val').textContent=fmt(total)+' ກີບ';
}

function clearLog(){soldLog=[];renderLog();}

// ===== AUDIO =====
function beep(){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);o.start();o.stop(c.currentTime+0.12);}catch(e){}
}
function beepOk(){
  try{const c=new(window.AudioContext||window.webkitAudioContext)();[660,880].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.25,c.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.1+0.15);o.start(c.currentTime+i*0.1);o.stop(c.currentTime+i*0.1+0.15);});}catch(e){}
}

// ===== TOAST =====
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast '+(type==='ok'?'ok-t':'err-t');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

// keyboard
document.getElementById('sku-in').addEventListener('keydown',e=>{if(e.key==='Enter')lookupManual();});
// close modal on bg click
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cancelSale();});
</script>
