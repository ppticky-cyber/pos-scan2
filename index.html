<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>POS ສະແກນ & ຂາຍ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.app{max-width:430px;margin:0 auto;padding:.75rem}
h2{font-size:17px;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between}
.cam-btn{width:100%;padding:16px;font-size:16px;font-weight:700;background:#1D9E75;color:#fff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:.75rem}
.cam-btn.on{background:#e53935}
#vw{display:none;position:relative;width:100%;background:#000;border-radius:14px;overflow:hidden;margin-bottom:.75rem}
#vw video{width:100%;display:block;max-height:260px;object-fit:cover}
.sbox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:120px;border:2.5px solid #1D9E75;border-radius:8px}
.sline{position:absolute;left:5%;right:5%;height:2px;background:#1D9E75;animation:sw 1.8s ease-in-out infinite}
@keyframes sw{0%,100%{top:15%}50%{top:82%}}
.hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.9)}
.manual{display:flex;gap:6px;margin-bottom:.75rem}
.manual input{flex:1;font-size:14px;text-transform:uppercase;padding:10px 12px;border:1px solid #ddd;border-radius:10px;background:#fff}
.manual button{padding:10px 14px;background:#444;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer}
/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:.75rem}
.tab{flex:1;padding:8px;font-size:13px;font-weight:600;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;color:#888}
.tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
/* log */
.log-box{background:#fff;border-radius:14px;padding:.75rem;margin-bottom:.75rem}
.log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-hdr span{font-size:13px;font-weight:600;color:#444}
.log-hdr .export-btn{padding:5px 10px;font-size:12px;background:#1D9E75;color:#fff;border:none;border-radius:8px;cursor:pointer}
.log-hdr .clear-btn{padding:5px 10px;font-size:12px;background:#fde8e8;color:#e53935;border:none;border-radius:8px;cursor:pointer}
.li{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f0f0f0}
.li:last-child{border:none}
.li-l .li-sku{font-size:11px;font-family:monospace;font-weight:600;color:#1a1a1a}
.li-l .li-sub{font-size:10px;color:#888;margin-top:1px}
.li-r{font-size:13px;font-weight:700;color:#1D9E75;white-space:nowrap;margin-left:8px}
.empty{text-align:center;color:#bbb;font-size:13px;padding:20px 0}
/* stock tab */
.stk-box{background:#fff;border-radius:14px;padding:.75rem;margin-bottom:.75rem}
.stk-search{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;margin-bottom:8px}
.stk-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.stk-row:last-child{border:none}
.stk-sku{font-family:monospace;font-size:10px;color:#444}
.stk-info{font-size:10px;color:#888}
.stk-qty{font-weight:700;min-width:28px;text-align:right}
.stk-qty.ok{color:#1D9E75}
.stk-qty.low{color:#e65100}
.stk-qty.out{color:#e53935}
/* summary */
.sum-box{background:#fff;border-radius:14px;padding:.75rem;margin-bottom:.75rem}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.sum-row:last-child{border:none;font-weight:700;font-size:15px}
/* total bar */
.tot{background:#1D9E75;border-radius:14px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.tot span:first-child{font-size:12px;color:rgba(255,255,255,.8)}
.tot span:last-child{font-size:18px;font-weight:800;color:#fff}
/* modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:flex-end;justify-content:center}
.mbg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:430px;animation:su .22s ease}
@keyframes su{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-sku{font-size:10px;font-family:monospace;color:#888;margin-bottom:3px}
.m-info{font-size:16px;font-weight:700;margin-bottom:2px}
.m-meta{font-size:13px;color:#888;margin-bottom:1rem}
.m-price{font-size:44px;font-weight:900;color:#1D9E75;text-align:center;margin-bottom:4px}
.m-plbl{font-size:11px;color:#888;text-align:center;margin-bottom:.75rem}
.m-stk{display:flex;justify-content:center;margin-bottom:.75rem}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 14px;border-radius:20px;font-weight:600}
.pill.ok{background:#e6f9f3;color:#1D9E75}
.pill.low{background:#fff3e0;color:#e65100}
.pill.out{background:#fde8e8;color:#e53935}
.qrow{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:1.25rem}
.qrow label{font-size:13px;color:#888}
.qb{width:38px;height:38px;border-radius:50%;font-size:22px;font-weight:700;border:1px solid #ddd;background:#f5f5f5;cursor:pointer}
.qv{font-size:24px;font-weight:800;min-width:44px;text-align:center}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.b-ok{padding:16px;font-size:16px;font-weight:800;background:#1D9E75;color:#fff;border:none;border-radius:14px;cursor:pointer}
.b-ok:disabled{opacity:.35;cursor:not-allowed}
.b-no{padding:16px;font-size:16px;font-weight:800;background:#fde8e8;color:#e53935;border:none;border-radius:14px;cursor:pointer}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:14px;font-size:13px;font-weight:700;z-index:1100;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.18)}
.t-ok{background:#e6f9f3;color:#1D9E75;border:1px solid #1D9E75}
.t-err{background:#fde8e8;color:#e53935;border:1px solid #e53935}
</style>
</head>

<div class="app">
  <h2>🛍 POS ສະແກນ & ຂາຍ <span style="font-size:11px;color:#888;font-weight:400">135 SKU</span></h2>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('sell')">ຂາຍ</button>
    <button class="tab" onclick="showTab('log')">ປະຫວັດ</button>
    <button class="tab" onclick="showTab('stock')">ສະຕັອກ</button>
  </div>

  <!-- SELL TAB -->
  <div id="tab-sell">
    <button class="cam-btn" id="cb" onclick="toggleCam()">📷 ກົດນີ້ເພື່ອສ່ອງ Barcode</button>
    <div id="vw">
      <video id="vid" autoplay playsinline muted></video>
      <div class="sbox"><div class="sline"></div></div>
      <div class="hint">ສ່ອງ barcode ເຂົ້າກ່ອບສີຂຽວ</div>
    </div>
    <div class="manual">
      <input id="si" type="text" placeholder="ຫຼື ພິມ SKU..." autocomplete="off"/>
      <button onclick="doLookup()">🔍</button>
    </div>
    <div id="today-sum" style="display:none"></div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" style="display:none">
    <div class="log-box">
      <div class="log-hdr">
        <span id="log-title">ປະຫວັດການຂາຍ</span>
        <div style="display:flex;gap:6px">
          <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
          <button class="clear-btn" onclick="clearLog()">🗑 ລ້າງ</button>
        </div>
      </div>
      <div id="ll"></div>
    </div>
  </div>

  <!-- STOCK TAB -->
  <div id="tab-stock" style="display:none">
    <div class="stk-box">
      <input class="stk-search" type="text" placeholder="ຄົ້ນ SKU / ສີ..." oninput="renderStock(this.value)"/>
      <div id="stk-list"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mb">
  <div class="modal">
    <div class="m-sku" id="msku"></div>
    <div class="m-info" id="minf"></div>
    <div class="m-meta" id="mmet"></div>
    <div class="m-price" id="mprc"></div>
    <div class="m-plbl">ລາຄາຂາຍ (ກີບ)</div>
    <div class="m-stk"><span class="pill" id="mstk"></span></div>
    <div class="qrow">
      <label>ຈຳນວນ</label>
      <button class="qb" onclick="adj(-1)">−</button>
      <div class="qv" id="mqv">1</div>
      <button class="qb" onclick="adj(1)">+</button>
    </div>
    <div class="btns">
      <button class="b-no" onclick="doCancel()">✕ Cancel</button>
      <button class="b-ok" id="bok" onclick="doSell()">✓ OK Sold</button>
    </div>
  </div>
</div>
<div class="toast" id="tst"></div>

// ===== localStorage KEYS =====
const KEY_STOCK='pos_stock_v1';
const KEY_LOG='pos_log_v1';

// Load or init stock
function initStock(){
  const saved=localStorage.getItem(KEY_STOCK);
  if(saved){try{return JSON.parse(saved);}catch(e){}}
  const s={};
  RAW.forEach(([sk,c,g,sz,p,q])=>{s[sk]={sku:sk,color:c,gender:g,size:sz,sell:p,rem:q};});
  localStorage.setItem(KEY_STOCK,JSON.stringify(s));
  return s;
}
function saveStock(){localStorage.setItem(KEY_STOCK,JSON.stringify(stock));}

// Load or init log
function initLog(){
  const saved=localStorage.getItem(KEY_LOG);
  if(saved){try{return JSON.parse(saved);}catch(e){}}
  return [];
}
function saveLog(){localStorage.setItem(KEY_LOG,JSON.stringify(salesLog));}

const fmt=n=>n.toLocaleString();

// ===== TABS =====
function showTab(t){
  curTab=t;
  ['sell','log','stock'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=(id===t?'block':'none');
  });
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['sell','log','stock'][i]===t);
  });
  if(t==='log')renderLog();
  if(t==='stock')renderStock('');
}

// ===== CAMERA =====

    const back=devs.find(d=>d.label.toLowerCase().match(/back|rear|environment/));
    const id=(back||devs[devs.length-1]||devs[0])?.deviceId;
    document.getElementById('vw').style.display='block';
    btn.textContent='🔴 ປິດກ້ອງ';btn.classList.add('on');
    scanning=true;
    await cr.decodeFromVideoDevice(id||null,'vid',onScan);
  }catch(e){showToast('ເປີດກ້ອງບໍ່ໄດ້','err');stopCam();}
}
function stopCam(){
  if(cr){try{cr.reset();}catch(e){}}
  cr=null;scanning=false;
  document.getElementById('vw').style.display='none';
  const btn=document.getElementById('cb');
  btn.textContent='📷 ກົດນີ້ເພື່ອສ່ອງ Barcode';btn.classList.remove('on');
  const v=document.getElementById('vid');
  if(v?.srcObject)v.srcObject.getTracks().forEach(t=>t.stop());
}
function onScan(res){
  if(!res)return;
  const now=Date.now(),code=res.getText().trim().toUpperCase();
  if(code===lc&&now-lt<3000)return;
  lc=code;lt=now;beep();showModal(code);
}
function doLookup(){
  const v=document.getElementById('si').value.trim().toUpperCase();
  if(!v){showToast('ໃສ່ SKU ກ່ອນ','err');return;}
  showModal(v);document.getElementById('si').value='';
}

// ===== MODAL =====
function showModal(sku){
  const it=stock[sku];
  if(!it){showToast('ບໍ່ພົບ: '+sku,'err');return;}
  cur=sku;qty=1;
  document.getElementById('msku').textContent=sku;
  document.getElementById('minf').textContent=it.color+' — '+it.gender;
  document.getElementById('mmet').textContent='Size: '+it.size;
  document.getElementById('mprc').textContent=fmt(it.sell);
  document.getElementById('mqv').textContent='1';
  const sp=document.getElementById('mstk');const r=it.rem;
  if(r===0){sp.className='pill out';sp.textContent='⚠ ໝົດສະຕັອກ';}
  else if(r<=3){sp.className='pill low';sp.textContent='⚡ ໃກ້ໝົດ — ຄົງ '+r+' ອັນ';}
  else{sp.className='pill ok';sp.textContent='✓ ຄົງ '+r+' ອັນ';}
  document.getElementById('bok').disabled=(r===0);
  document.getElementById('mb').classList.add('show');
}
function adj(d){if(!cur)return;qty=Math.max(1,Math.min(stock[cur].rem,qty+d));document.getElementById('mqv').textContent=qty;}
function doCancel(){document.getElementById('mb').classList.remove('show');cur=null;qty=1;lc='';}

function doSell(){
  if(!cur)return;
  const it=stock[cur];
  if(qty>it.rem){showToast('ສະຕັອກບໍ່ພໍ!','err');return;}
  // ຫັກສະຕັອກ
  it.rem-=qty;
  saveStock();
  // ບັນທຶກ log
  const now=new Date();
  const entry={
    sku:cur,color:it.color,gender:it.gender,size:it.size,
    qty,price:it.sell,amt:it.sell*qty,
    date:now.toLocaleDateString('lo'),
    time:now.toLocaleTimeString('lo',{hour:'2-digit',minute:'2-digit'}),
    ts:now.toISOString()
  };
  salesLog.unshift(entry);
  saveLog();
  document.getElementById('mb').classList.remove('show');
  beepOk();
  showToast('✓ ຂາຍ x'+qty+' = '+fmt(it.sell*qty)+' ກີບ — ບັນທຶກແລ້ວ ✅','ok');
  cur=null;qty=1;lc='';
  renderTodaySummary();
}

// ===== TODAY SUMMARY =====
function renderTodaySummary(){
  const today=new Date().toLocaleDateString('lo');
  const todayItems=salesLog.filter(s=>s.date===today);
  const div=document.getElementById('today-sum');
  if(!todayItems.length){div.style.display='none';return;}
  const total=todayItems.reduce((s,i)=>s+i.amt,0);
  const count=todayItems.reduce((s,i)=>s+i.qty,0);
  div.style.display='block';
  div.innerHTML=`<div class="sum-box">
    <div style="font-size:13px;font-weight:600;color:#444;margin-bottom:8px">📊 ຍອດຂາຍວັນນີ້</div>
    <div class="sum-row"><span>ຈຳນວນທີ່ຂາຍ</span><span>${count} ອັນ</span></div>
    <div class="sum-row"><span>ຈຳນວນ SKU</span><span>${todayItems.length} ລາຍການ</span></div>
    <div class="sum-row"><span>ຍອດລວມ</span><span style="color:#1D9E75">${fmt(total)} ກີບ</span></div>
  </div>`;
}

// ===== LOG TAB =====
function renderLog(){
  const ll=document.getElementById('ll');
  if(!salesLog.length){ll.innerHTML='<div class="empty">ຍັງບໍ່ມີປະຫວັດການຂາຍ</div>';return;}
  // group by date
  const groups={};
  salesLog.forEach(s=>{
    if(!groups[s.date])groups[s.date]=[];
    groups[s.date].push(s);
  });
  let html='';
  Object.entries(groups).forEach(([date,items])=>{
    const tot=items.reduce((s,i)=>s+i.amt,0);
    html+=`<div style="font-size:12px;font-weight:700;color:#1D9E75;padding:6px 0 4px">${date} — ${fmt(tot)} ກີບ</div>`;
    items.forEach(s=>{
      html+=`<div class="li">
        <div class="li-l">
          <div class="li-sku">${s.sku}</div>
          <div class="li-sub">${s.color}·${s.size}·x${s.qty}·${s.time}</div>
        </div>
        <div class="li-r">+${fmt(s.amt)}</div>
      </div>`;
    });
  });
  ll.innerHTML=html;
  // update title
  const total=salesLog.reduce((s,i)=>s+i.amt,0);
  document.getElementById('log-title').textContent=`ປະຫວັດ (${fmt(total)} ກີບ)`;
}

// ===== EXPORT CSV =====
function exportCSV(){
  if(!salesLog.length){showToast('ບໍ່ມີຂໍ້ມູນ','err');return;}
  const rows=[['Date','Time','SKU','Color','Gender','Size','Qty','Price','Amount']];
  salesLog.forEach(s=>rows.push([s.date,s.time,s.sku,s.color,s.gender,s.size,s.qty,s.price,s.amt]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='sales_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  showToast('Export CSV ສຳເລັດ!','ok');
}

// ===== CLEAR LOG =====
function clearLog(){
  if(!confirm('ລ້າງປະຫວັດທັງໝົດ?'))return;
  salesLog=[];saveLog();renderLog();
  showToast('ລ້າງແລ້ວ','ok');
}

// ===== STOCK TAB =====
function renderStock(q){
  const items=Object.values(stock).filter(i=>
    !q||i.sku.toLowerCase().includes(q.toLowerCase())||i.color.toLowerCase().includes(q.toLowerCase())
  );
  const div=document.getElementById('stk-list');
  if(!items.length){div.innerHTML='<div class="empty">ບໍ່ພົບ</div>';return;}
  div.innerHTML=items.map(i=>{
    const cls=i.rem===0?'out':i.rem<=3?'low':'ok';
    return`<div class="stk-row">
      <div><div class="stk-sku">${i.sku}</div><div class="stk-info">${i.color}·${i.gender}·${i.size}·${fmt(i.sell)}ກີບ</div></div>
      <div class="stk-qty ${cls}">${i.rem}</div>
    </div>`;
  }).join('');
}

// ===== AUDIO =====
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);o.start();o.stop(c.currentTime+0.12);}catch(e){}}
function beepOk(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[660,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(0.25,c.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*.12+.15);o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.15);});}catch(e){}}

// ===== TOAST =====
function showToast(msg,type){const el=document.getElementById('tst');el.textContent=msg;el.className='toast '+(type==='ok'?'t-ok':'t-err');el.style.display='block';setTimeout(()=>el.style.display='none',3000);}

// ===== INIT =====
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doLookup();});
document.getElementById('mb').addEventListener('click',function(e){if(e.target===this)doCancel();});
renderTodaySummary();
</script>
</body>
</html>
